name: marapedia_flutter
description: "It is marapedia."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.2
  google_sign_in: ^6.2.2
  go_router: ^17.1.0
  flutter_bloc: ^9.1.1
  cached_network_image: ^3.4.1
  flutter_html: ^3.0.0
  google_fonts: ^8.0.2
  image_picker: ^1.2.1
  flutter_secure_storage: ^10.0.0
  flutter_image_compress: ^2.4.0
  timeago: ^3.7.1
  intl: ^0.20.2
  shimmer: ^3.0.0
  equatable: ^2.0.8
  collection: ^1.19.1
  flutter_quill: ^11.5.0
  share_plus: ^12.0.2
  gal: ^2.3.0                    # ← replaced image_gallery_saver_plus
  permission_handler: ^12.0.1
  device_info_plus: ^12.4.0
  hive_flutter: ^1.1.0
  icons_launcher: ^3.1.0
  flutter_native_splash: ^2.4.7
  youtube_player_iframe: ^5.2.2
  youtube_player_flutter: ^9.1.3
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
     - assets/logo.png
     - .env

icons_launcher:
  image_path: 'assets/logo.png'
  platforms:
    android:
      enable: true
      image_path: 'assets/logo.png'
      adaptive_background_color: '#ffffff'
      adaptive_foreground_image: 'assets/logo.png'

flutter_native_splash:
  color: "#fefefe"
  image: assets/logo.png